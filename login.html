<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLink | Login & Signup</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => document.getElementById("navbar").innerHTML = data);
</script>

  <div class="container">
    <div class="form-box">
      <h1>Welcome to <span>LifeLink</span></h1>
      <p>Find Blood • Save Lives</p>

      <div class="button-box">
        <button id="loginBtn" class="toggle-btn active" onclick="showLogin()">Login</button>
        <button id="signupBtn" class="toggle-btn" onclick="showSignup()">Signup</button>
      </div>

      <form id="loginForm" class="form active">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="submit-btn">Login</button>
      </form>

      <form id="signupForm" class="form">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <select required>
          <option value="" disabled selected>Select Blood Group</option>
          <option>A+</option>
          <option>A-</option>
          <option>B+</option>
          <option>B-</option>
          <option>O+</option>
          <option>O-</option>
          <option>AB+</option>
          <option>AB-</option>
        </select>
        <button type="submit" class="submit-btn">Signup</button>
      </form>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');

    function showSignup() {
      signupForm.classList.add('active');
      loginForm.classList.remove('active');
      signupBtn.classList.add('active');
      loginBtn.classList.remove('active');
    }

    function showLogin() {
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      loginBtn.classList.add('active');
      signupBtn.classList.remove('active');
    }
  </script>
</body>
</html>
