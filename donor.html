<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donate Blood | LifeLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="donor.css">
</head>
<body>

<!-- 🔴 NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">LifeLink</h2>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="find-blood.html">Find Blood</a></li>
      <li><a href="donor.html" class="active">Donate</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>
</header>

<!-- 🩸 DONOR FORM -->
<div class="container">
  <h1>Blood Donor Registration</h1>
  <p>Become a donor and help save lives</p>

  <form id="donorForm">
    <input type="text" placeholder="Full Name" required>
    <input type="number" placeholder="Age" min="18" max="65" required>

    <select id="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <!-- Female-only fields -->
    <div id="femaleFields" class="hidden">
      <input type="number" placeholder="Weight (kg)" min="40">
      <input type="number" placeholder="HB Percentage (%)" step="0.1">
    </div>

    <input type="email" placeholder="Email Address" required>
    <input type="tel" placeholder="Phone Number" required>

    <button type="submit">Register as Donor</button>
  </form>
</div>

<footer>
  <p>© 2025 LifeLink | Designed by Gujjula Ravithreni ❤️</p>
</footer>

<!-- 🔹 JS (only for gender logic) -->
<script>
  const genderSelect = document.getElementById("gender");
  const femaleFields = document.getElementById("femaleFields");

  genderSelect.addEventListener("change", () => {
    if (genderSelect.value === "Female") {
      femaleFields.classList.remove("hidden");
    } else {
      femaleFields.classList.add("hidden");
    }
  });
</script>

</body>
</html>
